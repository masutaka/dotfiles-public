onboarding = false

[experimental]
switch_ascii_input_source_in_prefix = true

[keys]
prefix = "ctrl+z"

detach = "prefix+d"

new_workspace = "prefix+shift+c"
previous_workspace = "prefix+shift+p"
next_workspace = "prefix+shift+n"

new_tab = "prefix+ctrl+c"
previous_tab = "prefix+ctrl+p"
next_tab = "prefix+ctrl+n"

[theme]
name = "gruvbox"
auto_switch = false

[ui]
prompt_new_tab_name = false

[ui.toast]
delivery = "system"

[update]
version_check = false
