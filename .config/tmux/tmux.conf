unbind-key C-b
set-option -g prefix C-z
bind-key C-z send-prefix

set-option -g history-limit 99999
set-window-option -g mode-keys vi

set -g status-style bg=black,fg=white
set-window-option -g window-status-current-style bg=green,fg=black

set-option -g status-right ""

bind-key -T prefix C-c new-window
bind-key -T prefix C-n next-window
bind-key -T prefix C-p previous-window

# The default value was changed from v3.3.
# https://github.com/tmux/tmux/issues/3203
# https://twitter.com/madogiwa/status/1532023922325360640
set -g default-terminal "xterm-256color"

# Claude Code の未読通知 UX を構成する 3 設定。~/.claude/settings.json
# のフックから ~/.claude/scripts/tmux-spinner.sh が @unread を立てると、
# 非 current ウィンドウにシアンの●を表示し、after-select-window フック
# でウィンドウ切り替え時に自動クリアする。current フォーマットも同じ
# レイアウトで定義しているのは、未指定だと tmux デフォルトの '#I:#W#F'
# に fallback して幅・区切り・フラグが変わり、切り替えのたびに status
# bar がガタつくため。current では @unread が常にクリア済みなので 2
# 文字スペースで桁を合わせるだけで足りる。
setw -g window-status-format '#{?@unread,#[fg=cyan]● #[default],  }#I #W '
setw -g window-status-current-format '  #I #W '
set-hook -g after-select-window 'set-option -w -u @unread'
